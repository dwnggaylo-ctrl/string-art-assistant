<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>String Art Assistant</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<div class="container">

<h1>🎯 String Art Assistant</h1>

<input id="fileInput" type="file" accept=".txt">

<div id="progress">

<div id="progressBar"></div>

</div>

<div id="step">

0 / 0

</div>

<div class="card">

<div class="title">

TỪ PIN

</div>

<div id="fromPin">

--

</div>

</div>

<div class="arrow">

↓

</div>

<div class="card">

<div class="title">

ĐẾN PIN

</div>

<div id="toPin">

--

</div>

</div>

<div class="buttons">

<button id="backBtn">

◀

</button>

<button id="nextBtn">

▶

</button>

</div>

</div>

<script src="script.js"></script>

</body>
</html>
